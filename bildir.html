<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakında - b0wl Community</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
    --green: #00e5b0;
    --green-dark: #00b389;
    --black: #0a0a0a;
    --dark: #111111;
    --light-gray: #888888;
    --white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
nav {
    width: 100%;
    background: var(--black);
    border-bottom: 1px solid #222;
}

.nav-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 0 40px; height: 64px;
    display: flex; align-items: center;
    justify-content: space-between;
}

.nav-logo {
    text-decoration: none;
    display: flex; align-items: center; gap: 12px;
}

.nav-logo-mark {
    width: 36px; height: 36px;
    background: var(--green); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.85rem;
    color: var(--black);
    font-family: 'Libre Baskerville', serif;
}

.nav-logo-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 1rem; color: var(--white);
    font-weight: 700;
}

.nav-back {
    font-size: 0.82rem; font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    transition: 0.2s;
    border: 1px solid #2a2a2a;
    padding: 8px 18px;
    border-radius: 2px;
}

.nav-back:hover {
    color: var(--white);
    border-color: #444;
}

/* MAIN */
main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
}

.content {
    max-width: 580px;
    width: 100%;
    text-align: center;
}

/* ICON */
.page-icon {
    width: 72px; height: 72px;
    background: rgba(0,229,176,0.08);
    border: 1px solid rgba(0,229,176,0.2);
    border-radius: 4px;
    display: flex; align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 35px;
}

/* LABEL */
.page-label {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--green); margin-bottom: 18px;
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
}

.label-dot {
    width: 6px; height: 6px;
    border-radius: 50%; background: var(--green);
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
}

/* TITLE */
h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 700; line-height: 1.2;
    letter-spacing: -0.5px; margin-bottom: 20px;
}

h1 em { font-style: italic; color: var(--green); }

p {
    color: var(--light-gray);
    font-size: 1rem; line-height: 1.8;
    font-weight: 300; margin-bottom: 45px;
}

/* DIVIDER */
.divider {
    width: 40px; height: 2px;
    background: var(--green);
    margin: 0 auto 45px;
    opacity: 0.4;
}

/* ACTIONS */
.actions {
    display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap;
}

.btn-primary {
    background: var(--green); color: var(--black);
    padding: 14px 30px; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 0.5px;
    text-decoration: none; border-radius: 2px;
    transition: 0.2s; display: inline-block;
    border: 2px solid var(--green);
}

.btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }

.btn-outline {
    background: transparent; color: rgba(255,255,255,0.6);
    padding: 14px 30px; font-weight: 600;
    font-size: 0.85rem; letter-spacing: 0.5px;
    text-decoration: none; border-radius: 2px;
    transition: 0.2s; display: inline-block;
    border: 2px solid #2a2a2a;
}

.btn-outline:hover { border-color: #444; color: var(--white); }

/* FOOTER */
footer {
    border-top: 1px solid #1a1a1a;
    padding: 20px 40px;
    text-align: center;
    font-size: 0.75rem;
    color: #333;
}

footer span { color: var(--green); }

@media (max-width: 600px) {
    .nav-inner { padding: 0 20px; }
    main { padding: 40px 20px; }
    .actions { flex-direction: column; align-items: center; }
    .btn-primary, .btn-outline { width: 100%; max-width: 300px; text-align: center; }
}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-mark">b0</div>
            <span class="nav-logo-text">b0wl Community</span>
        </a>
        <a href="javascript:history.back()" class="nav-back">← Geri Dön</a>
    </div>
</nav>

<!-- MAIN -->
<main>
    <div class="content">

        <div class="page-icon" id="pageIcon">⏳</div>

        <div class="page-label">
            <span class="label-dot"></span>
            Geliştirme Aşamasında
            <span class="label-dot"></span>
        </div>

        <h1>Çok Yakında<br><em>Burada Olacak</em></h1>

        <p id="pageDesc">Bu bölüm üzerinde aktif olarak çalışıyoruz. En kısa sürede sizlerle buluşacak.</p>

        <div class="divider"></div>

        <div class="actions">
            <a href="iletisim.html" class="btn-primary">Bizi Haberdar Et</a>
            <a href="index.html" class="btn-outline">Ana Sayfaya Dön</a>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer>
    © 2026 b0wl Community — Doğanın Sesi Ol <span>🌍</span>
</footer>

<script>
// Hangi sayfadan geldiğine göre içerik değiştir
const path = window.location.search;
const params = new URLSearchParams(path);
const page = params.get('page');

const pages = {
    bildir: {
        icon: '🚨',
        title: 'Hayvan Bildir<br><em>Yakında Aktif</em>',
        desc: 'AI destekli acil bildirim sistemimiz üzerinde çalışıyoruz. Yakında yaralı veya tehlikedeki hayvanları 30 saniyede en yakın kuruluşa bildirebileceksiniz.'
    },
    bagis: {
        icon: '💚',
        title: 'Bağış Sistemi<br><em>Yakında Aktif</em>',
        desc: '%0 komisyonlu şeffaf bağış sistemimizi hazırlıyoruz. Yakında doğrudan vahşi yaşam koruma fonlarına bağış yapabileceksiniz.'
    },
    market: {
        icon: '🛒',
        title: 'Sosyal Etki Marketi<br><em>Yakında Aktif</em>',
        desc: 'Her alışverişin bir anlam taşıdığı marketimizi hazırlıyoruz. Yakında bağış amaçlı ürünlere göz atabileceksiniz.'
    }
};

if (page && pages[page]) {
    document.getElementById('pageIcon').textContent = pages[page].icon;
    document.querySelector('h1').innerHTML = pages[page].title;
    document.getElementById('pageDesc').textContent = pages[page].desc;
    document.title = pages[page].title.replace(/<[^>]*>/g, '') + ' - b0wl Community';
}
</script>

</body>
</html>
